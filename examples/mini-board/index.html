<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>Mini Board — Attest 示范</title>
  </head>
  <body>
    <main data-agent-surface="board">
      <h1>支持工单板</h1>
      <ul>
        <li data-agent-object="ticket:101">登录页 500 错误</li>
        <li data-agent-object="ticket:102">导出 CSV 乱码</li>
        <li data-agent-object="ticket:103">移动端按钮错位</li>
      </ul>
      <section data-agent-surface="detail">选择一个工单查看详情。</section>
      <button data-agent-action="resolve" data-agent-risk="high">标记为已解决</button>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
